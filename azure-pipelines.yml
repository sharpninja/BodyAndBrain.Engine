trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

resources:
  repositories:
    - repository: FeatureFlags
      type: git
      name: McpServer/FeatureFlags
      ref: refs/heads/main

pool:
  name: Default

steps:
  - checkout: self
    path: s/BodyAndBrain.Engine

  - checkout: FeatureFlags
    path: s/FeatureFlags

  - task: UseDotNet@2
    displayName: Use .NET 10 SDK
    inputs:
      packageType: sdk
      version: 10.0.x

  - pwsh: dotnet test BodyAndBrain.Engine.slnx
    displayName: Test
    workingDirectory: $(Pipeline.Workspace)/s/BodyAndBrain.Engine
