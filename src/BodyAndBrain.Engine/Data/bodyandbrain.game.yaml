professions:
- id: fighter
  name: Fighter
  primaryStat: Strength
  classBonus: Groups of two or more fighters equipped with full shields can form a wall that adds 25 points to each participants'
    defensive bonus and provides cover for party members behind them.
- id: berserker
  name: Berserker
  primaryStat: Strength
  classBonus: Berserkers wielding dual battle-axes roll twice for both hit and damage, taking the better of the hit rolls
    and the sum of the damages rolls.
- id: paladin
  name: Paladin
  primaryStat: Piety
  classBonus: Paladins may pray during combat without taking a turn to do so.
- id: ranger
  name: Ranger
  primaryStat: Agility
  classBonus: Rangers gain an extra attack with a short bow for every four levels of advancement, up to level 16 at which
    they may let loose five arrows in a round.
- id: rogue
  name: Rogue
  primaryStat: Agility
  classBonus: Rogues wearing normal attire for a region may hide in urban areas without failure, even when being sought. They
    may not have any exposed armor or weapons when doing so.
- id: bard
  name: Bard
  primaryStat: Presence
  classBonus: Once a day a Bard can influence a person's decision in his favor without rolling.
- id: wizard
  name: Wizard
  primaryStat: Intelligence
  classBonus: Wizards are able to analyze an unknown scroll and cast a spell from it at normal effectiveness in a single turn.
- id: conjuror
  name: Conjuror
  primaryStat: Intelligence
  classBonus: Once a day the Conjuror can transform himself into one of the pets he is able to summon at his current level.
    The Conjuror will not lose control over any controlled pets. The transformation lasts no longer than 24 hours and the
    Conjuror can break the spell at any time. The conjuror will fight at the level of the same summoned pet and does not gain
    combat experience while not in human form.
- id: cleric
  name: Cleric
  primaryStat: Piety
  classBonus: Once per week a Cleric may spend 60 uninterrupted minutes praying over a dead follower of the same God and bring
    them back to life with one temporary point of stat loss across all stats for each three hours since death starting after
    the first 10 minutes after death. If the deceased follows a different God of the same alignment, then the Cleric must
    pray for three uninterrupted hours and the recipient receives one _permanent_ point of stat loss of their class's main
    stat, and two temporary stat points across all other stats.
